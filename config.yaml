# =============================================================================
# Conditional Diffusion Model — Central Configuration File
# Edit this file to change any path, hyperparameter, or model setting.
# =============================================================================

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  embeddings: "assets/185_sage_embeddings.pt"

  inters:
    book_train: "inters/AmazonBooks.train.inter"
    movie_train: "inters/AmazonMovies.train.inter"
    movie_valid: "inters/AmazonMovies.valid.inter"
    movie_test: "inters/AmazonMovies.test.inter"

  mappings:
    book: "mappings/book_mapping.json"
    movie: "mappings/movie_mapping.json"
    user: "mappings/user_mapping.json"

  checkpoints:
    best_model: "checkpoints/best_model.pt"
    best_model_two_stage: "checkpoints/best_model_two_stage.pt"

# ---------------------------------------------------------------------------
# Training Hyperparameters
# ---------------------------------------------------------------------------
training:
  batch_size: 2048
  learning_rate: 1.0e-3
  weight_decay: 1.0e-6
  num_epochs: 50
  max_seq_len: 10
  grad_clip_norm: 1.0
  validation_freq: 5 # run validation every N epochs

# ---------------------------------------------------------------------------
# DataLoader
# ---------------------------------------------------------------------------
dataloader:
  train_num_workers: 4
  train_pin_memory: true
  valid_batch_size: 512
  valid_num_workers: 4
  valid_pin_memory: true

# ---------------------------------------------------------------------------
# Model Architecture
# ---------------------------------------------------------------------------
model:
  embed_dim: 64
  num_heads: 4

  diffusion:
    steps: 100
    p_uncond: 0.1

  scheduler:
    eta_min: 1.0e-5 # CosineAnnealingLR minimum LR

# ---------------------------------------------------------------------------
# Validation / Inference Settings
# ---------------------------------------------------------------------------
validation:
  cfg_w: 2.0 # classifier-free guidance weight
  k_list: [10, 100, 500] # used by train_with_more_metrics.py
  top_k: 10 # used by train.py / train_two_stage.py

# ---------------------------------------------------------------------------
# Two-Stage Retrieval (train_two_stage.py only)
# ---------------------------------------------------------------------------
two_stage:
  recall_k: 1000 # Stage-1 candidate pool size
  top_k: 10 # Final recommendation list size
  cfg_w: 2.0 # CFG weight for diffusion rerank
