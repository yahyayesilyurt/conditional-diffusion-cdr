# =============================================================================
# Conditional Diffusion Model — Amazon Configuration
# Source domain : Book  (→ h_u_source)
# Target domain : Movie (→ h_u_target / recommendations)
# =============================================================================

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  embeddings: "assets/lightgcn.pt"

  inters:
    book_train: "inters/AmazonBooks.train.inter"
    movie_train: "inters/AmazonMovies.train.inter"
    movie_valid: "inters/AmazonMovies.valid.inter"
    movie_test: "inters/AmazonMovies.test.inter"

  mappings:
    book: "mappings/book_mapping.json"
    movie: "mappings/movie_mapping.json"
    user: "mappings/user_mapping.json"

  checkpoints:
    best_model: "checkpoints/best_model.pt"

# ---------------------------------------------------------------------------
# Training Hyperparameters
# ---------------------------------------------------------------------------
training:
  seed: 42 # reproducibility
  batch_size: 512 # 2048→512: VRAM limit
  learning_rate: 1.0e-4 # 1e-3 is too aggressive for AdamW + Transformer
  weight_decay: 1.0e-6
  num_epochs: 100
  max_seq_len: 10
  grad_clip_norm: 1.0
  validation_freq: 2 # run validation every N epochs
  early_stop_patience: 15 # stop if no improvement in 15 validations (~30 epochs)

# ---------------------------------------------------------------------------
# DataLoader
# ---------------------------------------------------------------------------
dataloader:
  train_num_workers: 4
  train_pin_memory: true
  valid_batch_size: 512
  valid_num_workers: 4
  valid_pin_memory: true

# ---------------------------------------------------------------------------
# Model Architecture
# ---------------------------------------------------------------------------
model:
  embed_dim: 256 # embedding dim — 64/128/256/512 supported
  num_heads: 8 # embed_dim % num_heads == 0 required (256/8=32)
  dropout: 0.1 # shared across E2EWrapper + DenoisingMLP + Aggregator
  use_book_stream:
    false # Ablation: true=Triple-Stream, false=GNN+movie only
    # Amazon Books→Movies experiment showed false gives better results

  diffusion:
    steps: 200 # 100→200: more precise noise schedule
    p_uncond: 0.1 # Classifier-Free Guidance dropout rate

  scheduler:
    eta_min: 1.0e-5 # CosineAnnealingLR minimum LR
    warmup_steps: 1000 # number of linear warm-up steps

# ---------------------------------------------------------------------------
# Validation / Inference Settings
# ---------------------------------------------------------------------------
validation:
  cfg_w: 2.0 # classifier-free guidance weight (swept in test.py)
  top_k: 10 # K value for HR@K and NDCG@K
